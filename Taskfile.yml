version: '3'

tasks:
  default:
    desc: 'Default task is to "build"'
    deps:
      - build

  list:
    desc: 'Lists available tasks'
    cmds:
      - task --list-all

  tidy:
    desc: 'Tidy go modules'
    run: once
    cmds:
      - go mod tidy
    sources:
      - "**/*.go"
      - go.mod
      - go.sum

  build:
    desc: 'Build the csq CLI'
    deps: [tidy]
    vars:
      GIT_VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo 0.6.0-dev
    cmds:
      - >
        go build
        -ldflags "-X github.com/neomantra/CivicSodaQuack/internal/version.Version={{.GIT_VERSION}}"
        -o csq ./cmd/csq
    generates:
      - csq
    sources:
      - "**/*.go"
      - go.mod
      - go.sum

  vet:
    desc: 'Run go vet'
    cmds:
      - go vet ./...

  test:
    desc: 'Run tests'
    deps: [vet]
    cmds:
      - go test ./...

  clean:
    desc: 'Remove built artifacts'
    cmds:
      - rm -f csq
      - rm -rf dist
